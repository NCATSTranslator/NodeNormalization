name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-loader.txt -r requirements-test.txt

      - name: Unit tests
        run: pytest -m "not integration"

      # GitHub's ubuntu runners have Docker, so testcontainers can start a real
      # Redis for the loader integration test.
      - name: Integration tests
        run: pytest -m integration
